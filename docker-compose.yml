version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: verifyai-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: verifyai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: verifyai-backend
    environment:
      - DATABASE_URL=postgresql://postgres:secretpassword@postgres:5432/verifyai
      - JWT_SECRET=super_secret_jwt_sign_key_change_me_in_production
      - GROQ_API_KEY=gsk_your_groq_api_key_goes_here
      - UPLOAD_DIR=uploads
      - PORT=8000
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/workspace/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: verifyai-frontend
    ports:
      - "8080:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
